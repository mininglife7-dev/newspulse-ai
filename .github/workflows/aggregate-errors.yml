name: Aggregate Errors

on:
  schedule:
    # Every 12 hours at 00:00 and 12:00 UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  aggregate-errors:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch Error Summary
        id: error-summary
        run: |
          # Check /api/health endpoint for error status
          HEALTH_RESPONSE=$(curl -s https://newspulse-ai.vercel.app/api/health)
          DEPLOYMENT_STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '.status // "unknown"')
          DB_STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '.db // "unknown"')

          echo "deployment_status=$DEPLOYMENT_STATUS" >> $GITHUB_OUTPUT
          echo "db_status=$DB_STATUS" >> $GITHUB_OUTPUT

          # Check /api/alerts for active issues
          ALERTS_RESPONSE=$(curl -s https://newspulse-ai.vercel.app/api/alerts)
          ALERT_COUNT=$(echo "$ALERTS_RESPONSE" | jq '.alerts | length // 0')
          echo "alert_count=$ALERT_COUNT" >> $GITHUB_OUTPUT

          # Extract error alerts (filter by severity)
          if [ "$ALERT_COUNT" -gt 0 ]; then
            CRITICAL_ALERTS=$(echo "$ALERTS_RESPONSE" | jq '[.alerts[] | select(.severity == "critical")] | length')
            HIGH_ALERTS=$(echo "$ALERTS_RESPONSE" | jq '[.alerts[] | select(.severity == "high")] | length')
            echo "critical_alerts=$CRITICAL_ALERTS" >> $GITHUB_OUTPUT
            echo "high_alerts=$HIGH_ALERTS" >> $GITHUB_OUTPUT
          else
            echo "critical_alerts=0" >> $GITHUB_OUTPUT
            echo "high_alerts=0" >> $GITHUB_OUTPUT
          fi

      - name: Analyze Error Patterns
        id: analysis
        run: |
          CRITICAL=${{ steps.error-summary.outputs.critical_alerts }}
          HIGH=${{ steps.error-summary.outputs.high_alerts }}
          TOTAL=${{ steps.error-summary.outputs.alert_count }}

          ERROR_STATUS="normal"
          if [ "$CRITICAL" -gt 0 ]; then
            ERROR_STATUS="critical"
            echo "🔴 Critical errors detected: $CRITICAL"
          elif [ "$HIGH" -gt 0 ]; then
            ERROR_STATUS="high"
            echo "🟠 High-severity errors detected: $HIGH"
          elif [ "$TOTAL" -gt 0 ]; then
            ERROR_STATUS="warning"
            echo "🟡 Warnings detected: $TOTAL"
          else
            ERROR_STATUS="healthy"
            echo "✅ No errors detected"
          fi

          echo "error_status=$ERROR_STATUS" >> $GITHUB_OUTPUT

      - name: Checkout for logging
        run: |
          git config user.email "governor@euroai.com"
          git config user.name "Governor"

      - name: Log Error Aggregation
        if: always()
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CRITICAL=${{ steps.error-summary.outputs.critical_alerts }}
          HIGH=${{ steps.error-summary.outputs.high_alerts }}
          TOTAL=${{ steps.error-summary.outputs.alert_count }}
          ERROR_STATUS="${{ steps.analysis.outputs.error_status }}"

          # Create monitoring-logs directory
          mkdir -p monitoring-logs

          # Log to error aggregation file (TSV format for readability)
          cat >> monitoring-logs/error-aggregation.log << EOF
          $TIMESTAMP | Status: $ERROR_STATUS | Critical: $CRITICAL | High: $HIGH | Total: $TOTAL | Overall: ${{ job.status }}
          EOF

          echo "Error summary logged:"
          echo "  Timestamp: $TIMESTAMP"
          echo "  Status: $ERROR_STATUS"
          echo "  Critical: $CRITICAL"
          echo "  High: $HIGH"
          echo "  Total Alerts: $TOTAL"

      - name: Commit Error Logs
        if: always()
        run: |
          git add monitoring-logs/error-aggregation.log || true
          git commit -m "Log error aggregation: ${{ steps.analysis.outputs.error_status }}" || true

      - name: Push Error Logs
        if: always()
        run: |
          git push origin HEAD:${{ github.ref }} || true

      - name: Alert on High Error Count
        if: steps.analysis.outputs.error_status == 'high' || steps.analysis.outputs.error_status == 'critical'
        uses: 8398a7/action-slack@v3
        with:
          status: warning
          text: |
            🔴 Error Aggregation Alert

            Status: ${{ steps.analysis.outputs.error_status }}
            Critical Alerts: ${{ steps.error-summary.outputs.critical_alerts }}
            High Alerts: ${{ steps.error-summary.outputs.high_alerts }}
            Total Alerts: ${{ steps.error-summary.outputs.alert_count }}
            Database Status: ${{ steps.error-summary.outputs.db_status }}

            Deployment: ${{ steps.error-summary.outputs.deployment_status }}

            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        continue-on-error: true

      - name: Create Issue on Critical Errors
        if: steps.analysis.outputs.error_status == 'critical' && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const critical = ${{ steps.error-summary.outputs.critical_alerts }};
            const high = ${{ steps.error-summary.outputs.high_alerts }};
            const total = ${{ steps.error-summary.outputs.alert_count }};

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Critical Error Aggregation Alert',
              body: `Error aggregation check detected critical issues at ${new Date().toISOString()}

Critical Alerts: ${critical}
High Alerts: ${high}
Total Alerts: ${total}

Database Status: ${{ steps.error-summary.outputs.db_status }}
Deployment: ${{ steps.error-summary.outputs.deployment_status }}

See workflow logs: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
              labels: ['production', 'incident', 'error-aggregation']
            });
            console.log(`Created issue #${issue.data.number}`);
        continue-on-error: true

      - name: Error Aggregation Summary
        if: always()
        run: |
          echo "Error Aggregation Report:"
          echo "========================="
          echo "Time: $(date -u)"
          echo "Status: ${{ steps.analysis.outputs.error_status }}"
          echo "Critical Alerts: ${{ steps.error-summary.outputs.critical_alerts }}"
          echo "High Alerts: ${{ steps.error-summary.outputs.high_alerts }}"
          echo "Total Alerts: ${{ steps.error-summary.outputs.alert_count }}"
          echo ""
          echo "Database: ${{ steps.error-summary.outputs.db_status }}"
          echo "Deployment: ${{ steps.error-summary.outputs.deployment_status }}"
          echo ""
          echo "Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
