name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: false

      - name: Format check
        run: npm run format:check

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # CI build only needs these to type-check; real values come from Vercel.
          FIRECRAWL_API_KEY: build-time-stub
          OPENAI_API_KEY: build-time-stub
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-time-stub
          SUPABASE_SERVICE_ROLE_KEY: build-time-stub

      - name: Smoke test (pages, buttons' endpoints, API truthfulness)
        run: npm run test:smoke

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (desktop + mobile, no credentials needed)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
