name: Customer Journey Verification

# Runs scripts/customer-journey-probe.mjs against LIVE production from a
# GitHub runner (Governor sandboxes cannot reach vercel.app/supabase.co).
# Uses only the public anon/publishable key — no secrets. Uploads every
# request/response as an evidence artifact.

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Production app URL'
        required: false
        default: 'https://newspulse-ai-eight.vercel.app'
        type: string
      supabase_url:
        description: 'Supabase project URL (public)'
        required: false
        default: 'https://cwbcvjiklrrkpmybefdp.supabase.co'
        type: string
      anon_key:
        description: 'Supabase anon/publishable key (public by design — ships in every client bundle)'
        required: false
        default: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3YmN2amlrbHJya3BteWJlZmRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTE1NjIsImV4cCI6MjA5OTc2NzU2Mn0.bM5UePAkOL-8TcCxXM6FD6FwmVikJghW5P2JMkmPl_E'
        type: string

jobs:
  journey:
    name: First-customer journey probe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run journey probe
        env:
          APP_URL: ${{ inputs.app_url }}
          SUPABASE_URL: ${{ inputs.supabase_url }}
          SUPABASE_ANON_KEY: ${{ inputs.anon_key }}
        run: node scripts/customer-journey-probe.mjs

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-journey-evidence-${{ github.run_id }}
          path: journey-artifacts/
          retention-days: 90
