name: 'DNA-GOV-012: Deployment Recovery'

on:
  workflow_run:
    # Trigger when CI workflow completes successfully (deployment is live)
    workflows: ['ci']
    types: [completed]
    branches: [main]
  schedule:
    # Also run every 5 minutes as a safety net
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor-and-recover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      statuses: read
      checks: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get deployment info
        id: deployment
        env:
          DEPLOY_URL: ${{ secrets.VERCEL_DEPLOYMENT_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::notice::VERCEL_DEPLOYMENT_URL not configured - recovery monitor skipped"
            exit 0
          fi

          # For now, use a fixed deployment ID
          # In production, this would come from Vercel API
          echo "deployment_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "deployment_id=current-$(date +%s)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Verify deployment health
        id: verify
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.deployment_url }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "🔍 Verifying deployment health..."
          RESPONSE=$(curl -s -w "\n%{http_code}" "$DEPLOY_URL/api/deployment-verification")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Deployment is healthy"
            echo "status=healthy" >> $GITHUB_OUTPUT
          elif [ "$HTTP_CODE" = "206" ]; then
            echo "⚠️ Deployment is degraded"
            echo "status=degraded" >> $GITHUB_OUTPUT
            echo "$BODY" | jq '.' >> /tmp/verification.json 2>/dev/null || echo "$BODY" >> /tmp/verification.json
          else
            echo "❌ Deployment is unhealthy (HTTP $HTTP_CODE)"
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "$BODY" | jq '.' >> /tmp/verification.json 2>/dev/null || echo "$BODY" >> /tmp/verification.json
          fi

      - name: Check error rates
        id: errors
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.deployment_url }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "📊 Checking error rates..."
          RESPONSE=$(curl -s "$DEPLOY_URL/api/error-rate")

          # Extract error rate status
          ERROR_STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"' 2>/dev/null)

          if [ "$ERROR_STATUS" = "critical" ]; then
            echo "🚨 Critical error rate detected"
            echo "should_recover=true" >> $GITHUB_OUTPUT
            echo "reason=Critical error rate spike" >> $GITHUB_OUTPUT
            echo "$RESPONSE" | jq '.' >> /tmp/error-rate.json 2>/dev/null || echo "$RESPONSE" >> /tmp/error-rate.json
          elif [ "$ERROR_STATUS" = "warning" ]; then
            echo "⚠️ Elevated error rate"
            echo "should_recover=false" >> $GITHUB_OUTPUT
            echo "$RESPONSE" | jq '.' >> /tmp/error-rate.json 2>/dev/null || echo "$RESPONSE" >> /tmp/error-rate.json
          else
            echo "✅ Error rate is normal"
            echo "should_recover=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger recovery if needed
        id: recovery
        if: steps.errors.outputs.should_recover == 'true'
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.deployment_url }}
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
        run: |
          echo "🔄 Triggering deployment recovery..."

          # Call incident response endpoint
          RESPONSE=$(curl -s -X POST "$DEPLOY_URL/api/incident-response" \
            -H "Content-Type: application/json" \
            -d '{
              "deploymentId": "'$DEPLOYMENT_ID'",
              "trigger": "error-rate-spike",
              "metrics": {
                "errorRate": 0.95
              }
            }')

          echo "$RESPONSE" | jq '.' > /tmp/incident-response.json 2>/dev/null || echo "$RESPONSE" > /tmp/incident-response.json

          # Check if incident was detected
          INCIDENT_DETECTED=$(echo "$RESPONSE" | jq -r '.incidentDetected // false' 2>/dev/null)

          if [ "$INCIDENT_DETECTED" = "true" ]; then
            INCIDENT_ID=$(echo "$RESPONSE" | jq -r '.incidentId // "unknown"' 2>/dev/null)
            ESCALATE=$(echo "$RESPONSE" | jq -r '.orchestrationDecision.shouldEscalateToFounder // false' 2>/dev/null)

            echo "incident_detected=true" >> $GITHUB_OUTPUT
            echo "incident_id=$INCIDENT_ID" >> $GITHUB_OUTPUT
            echo "escalate_to_founder=$ESCALATE" >> $GITHUB_OUTPUT

            if [ "$ESCALATE" = "true" ]; then
              echo "🚨 Incident escalated to Founder"
            else
              echo "✅ Auto-recovery initiated"
            fi
          fi

      - name: Create incident issue
        if: steps.recovery.outputs.incident_detected == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const incidentId = '${{ steps.recovery.outputs.incident_id }}';
            const deploymentId = '${{ steps.deployment.outputs.deployment_id }}';
            const escalated = '${{ steps.recovery.outputs.escalate_to_founder }}' === 'true';
            const reason = '${{ steps.errors.outputs.reason }}';
            const timestamp = '${{ steps.deployment.outputs.timestamp }}';

            const title = escalated
              ? `🚨 Production Incident: ${incidentId} - Requires Founder Review`
              : `✅ Production Incident Auto-Recovered: ${incidentId}`;

            const body = `## Deployment Recovery Report

**Status:** ${escalated ? 'Escalated to Founder' : 'Auto-Recovered'}
**Deployment ID:** ${deploymentId}
**Incident ID:** ${incidentId}
**Trigger:** ${reason}
**Timestamp:** ${timestamp}

### Details
- Error rate spike detected post-deployment
- Incident response orchestrated automatically
- Recovery mechanism: ${escalated ? 'Manual Founder intervention required' : 'Automatic rollback/remediation executed'}

### Next Steps
${escalated
  ? '1. Review deployment changes\n2. Assess rollback safety\n3. Approve or modify recovery action'
  : '1. Monitor error rates for regression\n2. Review auto-recovery actions\n3. Document incident for learning'}

### Related
- [Deployment Verification](${process.env.DEPLOY_URL}/api/deployment-verification?deploymentId=${deploymentId})
- [Incident Status](${process.env.DEPLOY_URL}/api/incident-response?deploymentId=${deploymentId})
`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['incident', 'deployment', escalated ? 'urgent' : 'resolved'],
              assignees: escalated ? ['mininglife7-dev'] : []
            });

      - name: Log recovery status
        if: always()
        run: |
          echo "📋 Deployment Recovery Summary"
          echo "=============================="
          echo "Deployment Status: ${{ steps.verify.outputs.status }}"
          echo "Recovery Needed: ${{ steps.errors.outputs.should_recover }}"
          echo "Incident Detected: ${{ steps.recovery.outputs.incident_detected }}"
          echo "Escalated: ${{ steps.recovery.outputs.escalate_to_founder }}"

          if [ -f /tmp/verification.json ]; then
            echo ""
            echo "Verification Report:"
            cat /tmp/verification.json | jq '.' || cat /tmp/verification.json
          fi

          if [ -f /tmp/error-rate.json ]; then
            echo ""
            echo "Error Rate Report:"
            cat /tmp/error-rate.json | jq '.' || cat /tmp/error-rate.json
          fi
