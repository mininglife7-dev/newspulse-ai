name: DNA-GOV-003 - Deployment Verification Monitor

on:
  schedule:
    # Every 12 hours. Was */10 (144 runs/day), part of the DNA-monitor cron load
    # that exhausted the repo's GitHub Actions minutes and took CI down. Run
    # on-demand any time via workflow_dispatch.
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  verify-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify deployment status
        env:
          DEPLOY_URL: ${{ secrets.VERCEL_DEPLOYMENT_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::notice::VERCEL_DEPLOYMENT_URL secret not configured - monitor skipped (will activate once set)"
            exit 0
          fi
          RESPONSE=$(curl -s -w "\n%{http_code}" "$DEPLOY_URL/api/verify-deployment" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deployment verification failed with status $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

          if echo "$BODY" | jq -e '.status == "critical"' 2>/dev/null; then
            echo "❌ Critical deployment issue detected"
            echo "$BODY" | jq '.alert' 2>/dev/null || true
            exit 1
          fi

          echo "✅ Deployment verification passed"
          echo "$BODY" | jq '.alert' 2>/dev/null || echo "$BODY"
