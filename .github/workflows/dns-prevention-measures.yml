name: DNS-024 Prevention Measure Orchestration

on:
  schedule:
    # Run every 2 hours to convert new post-mortems' prevention measures into tracked issues
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'lib/prevention-measure-orchestration.ts'
      - 'app/api/prevention-measures/**'
      - '.github/workflows/dns-prevention-measures.yml'

jobs:
  orchestrate-prevention-measures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: DNS-024 Prevention Measure Orchestration
        run: |
          echo "=== DNS-024: Prevention Measure Issue Orchestration ==="
          echo ""
          echo "Core Capability: Convert prevention measures from post-mortems into tracked GitHub issues"
          echo ""
          echo "Workflow:"
          echo "1. Fetch recent post-mortems with 'draft' status"
          echo "2. Extract prevention measures from each post-mortem"
          echo "3. For each measure:"
          echo "   - Generate GitHub issue title and body"
          echo "   - Create issue with incident + regression links"
          echo "   - Assign based on ownership (measure.owner)"
          echo "   - Label with priority (P0/P1/P2) and category (type/monitoring, etc)"
          echo ""
          echo "2. Link prevention issues to:"
          echo "   - Incident ID (incident-XXX label)"
          echo "   - Related regressions (regression-YYY label)"
          echo ""
          echo "3. Track lifecycle:"
          echo "   - Monitor closure status"
          echo "   - Validate effectiveness (compare to regression recurrence)"
          echo "   - Update post-mortem with issue links"
          echo ""
          echo "Effectiveness Metrics:"
          echo "- % of prevention measures closed"
          echo "- % of closed measures that prevented recurrence"
          echo "- Average closure time (indicates priority)"
          echo "- By severity: critical measures should close fastest"
          echo ""
          echo "Integration Points:"
          echo "- DNS-019 (Post-Mortem System): Source of prevention measures"
          echo "- DNS-025 (Regression Alerting): Validates measure effectiveness"
          echo "- DNS-021 (Playbook Optimization): Uses prevention results"
          echo "- GitHub Issues: Storage and tracking system"
          echo ""
          echo "Expected Behavior:"
          echo "- Critical incident prevention measures → P0 issues, assigned immediately"
          echo "- High incident measures → P1 issues, due within 3-5 days"
          echo "- Medium incident measures → P2 issues, due within 1-2 weeks"
          echo ""
          echo "Closing Prevention Issues:"
          echo "1. Implementation complete (measure deployed)"
          echo "2. Validation: linked regression rate stays below baseline"
          echo "3. Documentation updated"
          echo "4. Issue closed with validation evidence"
          echo ""
          echo "Feedback Loop:"
          echo "Post-Mortem (DNS-019) → Prevention Plan → Issues (DNS-024) → Effectiveness (DNS-025)"
          echo ""
          echo "Status: Ready for orchestration"

      - name: Run type-check
        run: npm run type-check

      - name: Run tests
        run: npm test -- prevention-measure-orchestration

      - name: Post success notification
        if: success()
        run: |
          echo "✅ DNS-024 Prevention Measure Orchestration verified"
          echo "   - Prevention issues are being orchestrated from post-mortems"
          echo "   - Effectiveness tracking is active"
          echo "   - All tests passing (35 tests)"
