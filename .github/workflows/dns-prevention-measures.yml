name: DNS-024 Prevention Measure Orchestration

on:
  schedule:
    # Run every 2 hours to convert new post-mortems' prevention measures into tracked issues
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'lib/prevention-measure-orchestration.ts'
      - 'app/api/prevention-measures/**'
      - '.github/workflows/dns-prevention-measures.yml'

jobs:
  orchestrate-prevention-measures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Run type-check
        run: npm run type-check

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: DNS-024 Verification
        if: success()
        run: |
          echo "✅ DNS-024 Prevention Measure Orchestration verified"
          echo ""
          echo "Core Capability: Convert prevention measures from post-mortems into tracked GitHub issues"
          echo ""
          echo "Integration:"
          echo "- DNS-019 (Post-Mortem System) → source of prevention measures"
          echo "- DNS-025 (Regression Alerting) → validates effectiveness"
          echo ""
          echo "Features:"
          echo "- Auto-create GitHub issues from prevention measures"
          echo "- Link to incidents and related regressions"
          echo "- Track lifecycle (open → in-progress → closed)"
          echo "- Measure effectiveness via regression monitoring"
          echo ""
          echo "All tests passing, type-check green, lint clean"
