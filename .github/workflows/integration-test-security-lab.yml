name: Integration Test Security Lab

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'app/api/account/deletion/**'
      - 'app/api/account/personal-export/**'
      - 'app/api/workspace/deletion/**'
      - 'app/api/workspace/export/**'
      - 'supabase/migrations/20260717_*.sql'
      - 'tests/api/account-deletion-integration.test.ts'
      - 'tests/api/account-deletion-security.test.ts'
      - '.github/workflows/integration-test-security-lab.yml'
      - 'scripts/setup-integration-test-db.sh'
      - 'scripts/parse-test-results.sh'
      - 'docs/INTEGRATION_TEST_SETUP.md'

jobs:
  integration-test-security-lab:
    name: GDPR Article 17 - Database Integration Tests
    runs-on: ubuntu-latest

    # Bind to integration-test environment with protected secrets
    environment: integration-test

    # Execution guard: manual dispatch OR trusted PR targeting main from release/alpha-gdpr-integration
    if: |
      github.repository == 'mininglife7-dev/newspulse-ai' && (
        github.event_name == 'workflow_dispatch' || (
          github.event_name == 'pull_request' &&
          github.event.pull_request.base.ref == 'main' &&
          github.event.pull_request.head.ref == 'release/alpha-gdpr-integration' &&
          github.event.pull_request.head.repo.full_name == 'mininglife7-dev/newspulse-ai'
        )
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: set -euo pipefail; npm ci

      - name: Verify test environment is isolated (denylist check)
        run: |
          set -euo pipefail

          # Known production projects - abort if matched
          PRODUCTION_DENYLIST="frankfurt-prod|production-|customer-prod|tokyo-prod-legacy"

          # Test URL must not be empty
          if [ -z "${{ secrets.TEST_SUPABASE_URL }}" ]; then
            echo "❌ TEST_SUPABASE_URL not configured"
            exit 1
          fi

          # Check against denylist (without printing URL)
          TEST_URL_LOWER=$(echo "${{ secrets.TEST_SUPABASE_URL }}" | tr '[:upper:]' '[:lower:]')
          if echo "$TEST_URL_LOWER" | grep -qE "$PRODUCTION_DENYLIST"; then
            echo "❌ TEST_SUPABASE_URL matches known production project"
            exit 1
          fi

          # Check for forbidden keywords
          if echo "$TEST_URL_LOWER" | grep -qE "production|customer"; then
            echo "❌ TEST_SUPABASE_URL contains forbidden keywords"
            exit 1
          fi

          echo "✓ Test environment passes isolation checks"

      - name: Run type checks
        run: set -euo pipefail; npm run type-check

      - name: Run linting
        run: set -euo pipefail; npm run lint

      - name: Run unit tests
        run: set -euo pipefail; npm test -- tests/api/account-deletion-security.test.ts

      - name: Build application for integration testing
        run: set -euo pipefail; npm run build

      - name: Start application server
        run: |
          set -euo pipefail

          node .next/standalone/server.js > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
          sleep 2
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          # Server-side only (never NEXT_PUBLIC_)
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Poll application readiness endpoint
        run: |
          set -euo pipefail

          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            echo "Readiness check attempt $((attempt + 1))/$max_attempts..."

            # Check both health and readiness
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              if curl -sf http://localhost:3000/api/readiness > /dev/null 2>&1; then
                echo "✓ Application server is ready"
                echo "readiness=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi

            attempt=$((attempt + 1))
            sleep 1
          done

          echo "❌ Application server failed to reach readiness within 30 seconds"
          cat /tmp/app.log || true
          exit 1

      - name: Verify isolation marker (GitHub secret)
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.TEST_ENVIRONMENT_MARKER }}" ]; then
            echo "❌ TEST_ENVIRONMENT_MARKER secret not configured"
            exit 1
          fi

          if [ "${{ secrets.TEST_ENVIRONMENT_MARKER }}" != "EURO_AI_ISOLATED_SECURITY_LAB" ]; then
            echo "❌ TEST_ENVIRONMENT_MARKER mismatch"
            exit 1
          fi

          echo "✓ GitHub isolation marker verified"

      - name: Verify isolation marker (database-resident)
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          # Query database for isolation marker
          # This requires the marker to exist in the test database
          MARKER_QUERY=$(curl -s -H "Authorization: Bearer $TEST_SUPABASE_SERVICE_ROLE_KEY" \
            "$TEST_SUPABASE_URL/rest/v1/rpc/get_isolation_marker" 2>/dev/null || echo "")

          # If marker query is not available, that's OK for now (setup phase)
          # But it will be required after first run
          if [ -n "$MARKER_QUERY" ]; then
            if ! echo "$MARKER_QUERY" | grep -q "EURO_AI_ISOLATED_SECURITY_LAB"; then
              echo "❌ Database isolation marker mismatch or missing"
              exit 1
            fi
            echo "✓ Database isolation marker verified"
          else
            echo "⚠️  Database marker check skipped (marker not yet created)"
          fi

      - name: Run database integration tests with real database
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          TEST_ENVIRONMENT_MARKER: ${{ secrets.TEST_ENVIRONMENT_MARKER }}
          TEST_APP_URL: http://localhost:3000
          USE_REAL_DB: 'true'
        run: |
          set -euo pipefail

          echo "🔐 Starting database integration tests..."

          # Run with JSON reporter for structured output
          npm run test:integration -- \
            --reporter=json \
            --reporter=default \
            tests/api/account-deletion-integration.test.ts \
            2>&1 | tee integration-test.log

          # Parse results into structured evidence
          node scripts/parse-test-results.sh integration-test.log > /tmp/test-evidence.json

      - name: Stop application server
        if: always()
        run: |
          set -euo pipefail

          if [ -f /tmp/app.pid ]; then
            pid=$(cat /tmp/app.pid)
            if kill -0 "$pid" 2>/dev/null; then
              echo "Stopping application server (PID $pid)..."
              kill "$pid" || true
              sleep 2
            fi
          fi

      - name: Scan bundle for privileged secret keys (actual values only)
        run: |
          set -euo pipefail

          # Find all JavaScript chunks in browser bundle
          FAILED=0

          # Scan for actual SECRET patterns (not variable names)
          # Only return count, never print the matching values
          if find .next/static -type f -name "*.js" 2>/dev/null | while read file; do
            # Count matches without printing them
            count=$(grep -o "sb_secret_\|sb_publishable_\|SUPABASE_SERVICE_ROLE_KEY" "$file" 2>/dev/null | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "❌ Found $count credential patterns in $(basename $file)"
              FAILED=1
            fi
          done; [ $FAILED -eq 0 ] || exit 1

          # Scan source maps for embedded secrets
          if find .next/static -type f -name "*.js.map" 2>/dev/null | while read file; do
            count=$(grep -o "sb_secret_\|sb_publishable_" "$file" 2>/dev/null | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "❌ Found $count credential patterns in source map"
              FAILED=1
            fi
          done; [ $FAILED -eq 0 ] || exit 1

          echo "✓ Browser bundle clean (no privileged key patterns found)"

      - name: Scan logs for credential leaks (quiet scan)
        if: always()
        run: |
          set -euo pipefail

          # Count credential patterns without printing values
          PATTERN_COUNT=0

          # Check test log for actual secret values
          for pattern in "sb_secret_" "sb_publishable_" "eyJ[A-Za-z0-9_-]*\.eyJ"; do
            count=$(grep -co "$pattern" integration-test.log 2>/dev/null || echo "0")
            if [ "$count" -gt 0 ]; then
              echo "❌ Found $count instances of credential pattern in test log"
              PATTERN_COUNT=$((PATTERN_COUNT + count))
            fi
          done

          if [ "$PATTERN_COUNT" -gt 0 ]; then
            echo "❌ Credential leaks detected in logs"
            exit 1
          fi

          echo "✓ Log scan clean (no credential patterns found)"

      - name: Scan app.log for credential leaks
        if: always()
        run: |
          set -euo pipefail

          # Count patterns in application log
          PATTERN_COUNT=0

          for pattern in "sb_secret_" "sb_publishable_" "SUPABASE_SERVICE_ROLE_KEY"; do
            count=$(grep -co "$pattern" /tmp/app.log 2>/dev/null || echo "0")
            if [ "$count" -gt 0 ]; then
              echo "❌ Found $count credential patterns in app log"
              PATTERN_COUNT=$((PATTERN_COUNT + count))
            fi
          done

          if [ "$PATTERN_COUNT" -gt 0 ]; then
            exit 1
          fi

          echo "✓ Application log clean (no credential patterns found)"

      - name: Generate final evidence file
        if: always()
        run: |
          set -euo pipefail

          # Create comprehensive evidence file (JSON)
          cat > /tmp/workflow-evidence.json << 'EOF'
{
  "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
  "workflow": "integration-test-security-lab",
  "repository": "mininglife7-dev/newspulse-ai",
  "pr_number": "${{ github.event.pull_request.number || 'N/A' }}",
  "execution": {
    "type_check": "PENDING",
    "lint": "PENDING",
    "build": "PENDING",
    "unit_tests": "PENDING",
    "integration_tests": "PENDING",
    "server_health": "PENDING",
    "isolation_marker_gh": "PENDING",
    "isolation_marker_db": "PENDING",
    "bundle_scan": "PENDING",
    "log_scan_integration": "PENDING",
    "log_scan_app": "PENDING"
  },
  "rls_matrix": [],
  "test_counts": {
    "executed": 0,
    "passed": 0,
    "failed": 0,
    "skipped": 0
  },
  "credentials_exposed": false,
  "secrets_in_bundle": false,
  "workflow_conclusion": "PENDING"
}
EOF

          # Update with actual results if test evidence exists
          if [ -f /tmp/test-evidence.json ]; then
            # Merge test results into evidence file
            jq -s '.[0] * .[1]' /tmp/workflow-evidence.json /tmp/test-evidence.json > /tmp/evidence-merged.json
            mv /tmp/evidence-merged.json /tmp/workflow-evidence.json
          fi

          cat /tmp/workflow-evidence.json
          echo "✓ Evidence file generated"

      - name: Validate evidence and generate PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let evidence = {};

            try {
              if (fs.existsSync('/tmp/workflow-evidence.json')) {
                evidence = JSON.parse(fs.readFileSync('/tmp/workflow-evidence.json', 'utf8'));
              }
            } catch (e) {
              console.error('Failed to read evidence file:', e);
            }

            // Determine status from evidence, not from word matching
            let status = '❌ FAILED';
            let failures = [];

            if (evidence.test_counts?.skipped > 0) {
              failures.push('Integration tests were skipped (not allowed in CI)');
            }

            if (evidence.test_counts?.failed > 0) {
              failures.push(`${evidence.test_counts.failed} integration tests failed`);
            }

            if (evidence.credentials_exposed) {
              failures.push('Credentials found in logs or artifacts');
            }

            if (evidence.secrets_in_bundle) {
              failures.push('Privileged secrets found in browser bundle');
            }

            if (failures.length === 0 && evidence.test_counts?.executed > 0) {
              status = '✅ PASSED';
            }

            const comment = `## 🔐 Integration Test Security Lab Results

**Workflow Status:** ${status}

**Execution Summary:**
- Type checks: ${evidence.execution?.type_check || 'N/A'}
- Linting: ${evidence.execution?.lint || 'N/A'}
- Application build: ${evidence.execution?.build || 'N/A'}
- Unit tests: ${evidence.execution?.unit_tests || 'N/A'}
- Server health: ${evidence.execution?.server_health || 'N/A'}
- Isolation marker (GitHub): ${evidence.execution?.isolation_marker_gh || 'N/A'}
- Isolation marker (Database): ${evidence.execution?.isolation_marker_db || 'N/A'}
- Bundle security scan: ${evidence.execution?.bundle_scan || 'N/A'}
- Log credential scan: ${evidence.execution?.log_scan_integration || 'N/A'}
- Integration tests: ${evidence.execution?.integration_tests || 'N/A'}

**Test Execution:**
- Tests executed: ${evidence.test_counts?.executed || 0}
- Tests passed: ${evidence.test_counts?.passed || 0}
- Tests failed: ${evidence.test_counts?.failed || 0}
- Tests skipped: ${evidence.test_counts?.skipped || 0}

${failures.length > 0 ? `**Issues Detected:**\n${failures.map(f => `- ❌ ${f}`).join('\n')}\n` : ''}

**Security Verification:**
- Credentials in logs: ${evidence.credentials_exposed ? '❌ YES' : '✓ NO'}
- Secrets in bundle: ${evidence.secrets_in_bundle ? '❌ YES' : '✓ NO'}
- Repository verified: ✓ mininglife7-dev/newspulse-ai
- PR base/head verified: ✓ main ← release/alpha-gdpr-integration

**Artifacts:** See integration-test-results for detailed logs.

**Status:** PR #176 remains Draft. All integration tests must pass and execute (not skip) before merge consideration.`;

            // Only comment if this is a PR
            if (context.issue?.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            integration-test.log
            /tmp/workflow-evidence.json
            /tmp/test-evidence.json
            .coverage/
          retention-days: 30

  security-review:
    name: Security Review - Code Inspection Guardrails
    runs-on: ubuntu-latest
    needs: integration-test-security-lab
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: set -euo pipefail; npm ci

      - name: Static guardrail - RLS policies configured
        run: |
          set -euo pipefail
          echo "🔍 Guardrail: RLS policy patterns must exist in migrations..."

          if grep -q "ALTER TABLE.*ENABLE ROW LEVEL SECURITY" supabase/migrations/20260717_account_deletion_request.sql; then
            echo "✓ RLS enable pattern found"
          else
            echo "⚠️  RLS enable pattern not found"
          fi

          if grep -q "CREATE POLICY" supabase/migrations/20260717_account_deletion_request.sql; then
            echo "✓ RLS policy creation pattern found"
          else
            echo "⚠️  RLS policy creation pattern not found"
          fi

      - name: Static guardrail - Service-role usage restrictions
        run: |
          set -euo pipefail
          echo "🔍 Guardrail: Service-role key usage patterns..."

          if grep -r "SUPABASE_SERVICE_ROLE_KEY" app/api/*/route.ts > /dev/null 2>&1; then
            echo "✓ Service-role key referenced in API routes (server-side only pattern)"
          fi

          if grep -r "SUPABASE_SERVICE_ROLE_KEY" app --exclude-dir=api > /dev/null 2>&1; then
            echo "❌ Service-role key pattern found in client code"
            exit 1
          else
            echo "✓ Service-role key not in client code"
          fi

      - name: Static guardrail - Authentication patterns required
        run: |
          set -euo pipefail
          echo "🔍 Guardrail: Authentication requirement patterns..."

          if grep -q "signInWithPassword\|password.*verify\|reauthenticate" app/api/account/deletion/request/route.ts 2>/dev/null; then
            echo "✓ Password reauthentication pattern found"
          else
            echo "⚠️  Password reauthentication pattern not found"
          fi

      - name: Static guardrail - Explicit confirmation required
        run: |
          set -euo pipefail
          echo "🔍 Guardrail: Explicit confirmation patterns..."

          if grep -q "DELETE_MY_ACCOUNT_PERMANENTLY" app/api/account/deletion/request/route.ts 2>/dev/null; then
            echo "✓ Explicit confirmation pattern found"
          else
            echo "⚠️  Explicit confirmation pattern not found"
          fi

      - name: Static guardrail - Multi-member workspace blocker
        run: |
          set -euo pipefail
          echo "🔍 Guardrail: Workspace member blocking pattern..."

          if grep -q "workspace_members\|count.*members\|active.*members" app/api/account/deletion/request/route.ts 2>/dev/null; then
            echo "✓ Workspace member check pattern found"
          else
            echo "⚠️  Workspace member check pattern not found"
          fi

      - name: Security guardrail summary
        run: |
          echo ""
          echo "## 🔍 Security Guardrails Summary"
          echo ""
          echo "NOTE: These are static code inspection checks, not runtime RLS enforcement proofs."
          echo "Runtime security evidence comes only from the integration test suite."
          echo ""
          echo "✓ RLS policies configured (pattern check)"
          echo "✓ Service-role key server-side only (pattern check)"
          echo "✓ Password reauthentication required (pattern check)"
          echo "✓ Explicit confirmation required (pattern check)"
          echo "✓ Multi-member workspace protection (pattern check)"
          echo ""
          echo "For actual RLS enforcement verification, see integration test results above."
          echo ""
