name: Monitor Production Health

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Vercel Deployment Status
        id: vercel-status
        run: |
          # Get latest deployment status
          DEPLOYMENT=$(curl -s "https://api.vercel.com/v13/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_API_TOKEN }}" \
            -H "Accept: application/json")

          STATUS=$(echo "$DEPLOYMENT" | jq -r '.deployments[0].state // "unknown"')
          URL=$(echo "$DEPLOYMENT" | jq -r '.deployments[0].url // "unknown"')

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

          if [[ "$STATUS" != "READY" ]]; then
            echo "❌ Deployment status: $STATUS"
            exit 1
          fi
          echo "✅ Deployment ready: $URL"

      - name: Check API Health Endpoint
        id: api-health
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" https://newspulse-ai.vercel.app/api/health)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Health endpoint returned $HTTP_CODE"
            exit 1
          fi

          # Verify response is valid JSON
          if ! echo "$BODY" | jq empty 2>/dev/null; then
            echo "❌ Health endpoint returned invalid JSON"
            exit 1
          fi

          # Check database status
          DB_STATUS=$(echo "$BODY" | jq -r '.db // "unknown"')
          if [[ "$DB_STATUS" != "ok" ]]; then
            echo "❌ Database status: $DB_STATUS"
            exit 1
          fi

          echo "✅ API health: OK, Database: OK"

      - name: Check Alerts Endpoint
        id: alerts
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" https://newspulse-ai.vercel.app/api/alerts)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Alerts endpoint returned $HTTP_CODE"
            exit 1
          fi

          if ! echo "$BODY" | jq empty 2>/dev/null; then
            echo "❌ Alerts endpoint returned invalid JSON"
            exit 1
          fi

          ALERT_COUNT=$(echo "$BODY" | jq '.alerts | length')
          echo "alert_count=$ALERT_COUNT" >> $GITHUB_OUTPUT

          if [[ $ALERT_COUNT -gt 0 ]]; then
            echo "⚠️ Active alerts: $ALERT_COUNT"
            echo "$BODY" | jq '.alerts[] | select(.severity == "critical")' | jq '.' || true
          else
            echo "✅ No active alerts"
          fi

      - name: Check Supabase Status
        id: supabase
        run: |
          STATUS_RESPONSE=$(curl -s "https://status.supabase.com/api/v2/status.json")
          STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status.indicator')

          echo "status=$STATUS" >> $GITHUB_OUTPUT

          if [[ "$STATUS" != "operational" ]]; then
            echo "❌ Supabase status: $STATUS"
            exit 1
          fi
          echo "✅ Supabase operational"

      - name: Check Error Rate (Last 5 minutes)
        id: error-rate
        run: |
          # This would require Vercel API with logs access
          # For now, we'll skip detailed error analysis
          echo "ℹ️ Error rate check requires Vercel logs API"
          echo "error_rate=0" >> $GITHUB_OUTPUT

      - name: Log Health Check Results
        if: always()
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          STATUS="success"
          if [[ "${{ job.status }}" != "success" ]]; then
            STATUS="failure"
          fi

          # Append to health check log
          mkdir -p monitoring-logs
          cat >> monitoring-logs/health-checks.log << EOF
          $TIMESTAMP | Status: $STATUS | Deployment: ${{ steps.vercel-status.outputs.status }} | API: ${{ steps.api-health.outputs.http_code }} | DB: OK | Supabase: ${{ steps.supabase.outputs.status }} | Alerts: ${{ steps.alerts.outputs.alert_count }}
          EOF

      - name: Commit Health Check Logs
        if: always()
        run: |
          git config user.email "governor@euroai.com"
          git config user.name "Governor"
          git add monitoring-logs/health-checks.log || true
          git commit -m "Log production health check: ${{ job.status }}" || true

      - name: Push Health Check Logs
        if: always()
        run: |
          git push origin HEAD:${{ github.ref }} || true

      - name: Alert on Critical Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            🚨 Production Health Check Failed

            Deployment: ${{ steps.vercel-status.outputs.status }}
            API Health: ${{ steps.api-health.outputs.http_code }}
            Supabase: ${{ steps.supabase.outputs.status }}

            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        continue-on-error: true

      - name: Create Issue on Critical Failure
        if: failure() && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Production Health Check Failed',
              body: `Health check failed at ${new Date().toISOString()}

              Deployment: ${{ steps.vercel-status.outputs.status }}
              API Health: ${{ steps.api-health.outputs.http_code }}
              Supabase: ${{ steps.supabase.outputs.status }}

              See workflow logs: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
              labels: ['production', 'incident']
            });
            console.log(`Created issue #${issue.data.number}`);
        continue-on-error: true

  report-health:
    if: always()
    needs: health-check
    runs-on: ubuntu-latest
    steps:
      - name: Health Check Summary
        run: |
          echo "Production Health Check Summary:"
          echo "================================"
          echo "Time: $(date -u)"
          echo "Status: ${{ needs.health-check.result }}"
          echo "Deployment: ${{ needs.health-check.outputs.vercel-status || 'unknown' }}"
          echo ""
          echo "Run ID: ${{ github.run_id }}"
          echo "Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
