name: Deploy Supabase Schema

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      project_id:
        description: 'Supabase project ID (optional - uses SUPABASE_PROJECT_ID var if not provided)'
        required: false
        type: string
      db_password:
        description: 'Supabase database password (optional - uses SUPABASE_DB_PASSWORD secret if not provided)'
        required: false
        type: string
  # Uncomment to auto-deploy on push to main:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'supabase/schema.sql'
  #     - '.github/workflows/supabase-schema-deploy.yml'

jobs:
  preflight-check:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate schema file exists
        run: |
          if [ ! -f "supabase/schema.sql" ]; then
            echo "❌ supabase/schema.sql not found"
            exit 1
          fi
          echo "✅ Schema file found ($(wc -l < supabase/schema.sql) lines)"

      - name: Validate schema syntax (basic)
        run: |
          # Check for CREATE/DROP IF EXISTS (idempotency)
          create_count=$(grep -c "CREATE.*IF NOT EXISTS" supabase/schema.sql || true)
          drop_count=$(grep -c "DROP.*IF EXISTS" supabase/schema.sql || true)
          echo "✅ Found $create_count CREATE IF NOT EXISTS statements"
          echo "✅ Found $drop_count DROP IF EXISTS statements"

      - name: Verify verification scripts exist
        run: |
          if [ ! -f "supabase/POST_DEPLOYMENT_VERIFICATION.sql" ]; then
            echo "⚠️  POST_DEPLOYMENT_VERIFICATION.sql not found"
          fi
          if [ ! -f "supabase/SECURITY_TESTS.sql" ]; then
            echo "⚠️  SECURITY_TESTS.sql not found"
          fi
          echo "✅ Preflight checks passed"

  deploy-schema:
    name: Deploy Supabase Schema
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: preflight-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql --version

      - name: Diagnostic - Verify configuration accessibility
        run: |
          PROJECT_ID_INPUT="${{ github.event.inputs.project_id }}"
          PROJECT_ID_VAR="${{ vars.SUPABASE_PROJECT_ID }}"
          PROJECT_ID="${PROJECT_ID_INPUT:-$PROJECT_ID_VAR}"

          DB_PASSWORD_INPUT="${{ github.event.inputs.db_password }}"
          DB_PASSWORD_SECRET="${{ secrets.SUPABASE_DB_PASSWORD }}"
          DB_PASSWORD="${DB_PASSWORD_INPUT:-$DB_PASSWORD_SECRET}"

          echo "🔍 Configuration Accessibility Check"
          echo "---"

          if [ -n "$PROJECT_ID_INPUT" ]; then
            echo "✅ PROJECT_ID from workflow input: ${#PROJECT_ID_INPUT} characters"
          fi

          if [ -z "$PROJECT_ID_VAR" ]; then
            echo "⚠️  SUPABASE_PROJECT_ID repository variable: NOT SET"
          else
            echo "✅ SUPABASE_PROJECT_ID repository variable: ${#PROJECT_ID_VAR} characters"
          fi

          if [ -n "$DB_PASSWORD_INPUT" ]; then
            echo "✅ DB_PASSWORD from workflow input: PRESENT"
          fi

          if [ -z "$DB_PASSWORD_SECRET" ]; then
            echo "⚠️  SUPABASE_DB_PASSWORD repository secret: NOT SET"
          else
            echo "✅ SUPABASE_DB_PASSWORD repository secret: PRESENT"
          fi

          echo "---"
          echo "Final PROJECT_ID source: $([ -n "$PROJECT_ID_INPUT" ] && echo "INPUT" || echo "VARIABLE")"
          echo "Final DB_PASSWORD source: $([ -n "$DB_PASSWORD_INPUT" ] && echo "INPUT" || echo "SECRET")"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow SHA: ${{ github.sha }}"
          echo "Job environment: ${GITHUB_JOB}"
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"

      - name: Validate Supabase configuration
        run: |
          # Use input if provided, otherwise fall back to repository variable
          PROJECT_ID="${{ github.event.inputs.project_id }}"
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="${{ vars.SUPABASE_PROJECT_ID }}"
          fi

          # Fail-closed: project ID must be present
          if [ -z "$PROJECT_ID" ]; then
            echo "❌ SUPABASE_PROJECT_ID not configured"
            echo "   Option 1: Set GitHub repository variable: SUPABASE_PROJECT_ID"
            echo "     Path: Settings → Secrets and variables → Actions → New repository variable"
            echo "   Option 2: Pass as workflow input when triggering"
            exit 1
          fi

          # Validate format: lowercase alphanumeric only
          if ! echo "$PROJECT_ID" | grep -E '^[a-z0-9]+$' > /dev/null; then
            echo "❌ SUPABASE_PROJECT_ID format invalid"
            echo "   Expected: lowercase alphanumeric characters only"
            echo "   Got: $PROJECT_ID"
            exit 1
          fi

          echo "✅ Supabase project ID validated"
          echo "SUPABASE_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

      - name: Verify database password secret
        env:
          DB_PASSWORD_INPUT: ${{ github.event.inputs.db_password }}
          DB_PASSWORD_SECRET: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Use input if provided, otherwise use secret
          DB_PASSWORD="${DB_PASSWORD_INPUT:-$DB_PASSWORD_SECRET}"

          if [ -z "$DB_PASSWORD" ]; then
            echo "❌ SUPABASE_DB_PASSWORD not configured"
            echo "   Option 1: Set GitHub repository secret: SUPABASE_DB_PASSWORD"
            echo "     Path: Settings → Secrets and variables → Actions → New repository secret"
            echo "   Option 2: Pass as workflow input when triggering (db_password parameter)"
            echo "   Value source: Supabase Dashboard → Settings → Database → Password"
            exit 1
          fi

          if [ -n "$DB_PASSWORD_INPUT" ]; then
            echo "✅ Database password from workflow input"
          else
            echo "✅ Database password from GitHub secret"
          fi

          # Export for use in next steps
          echo "SUPABASE_DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV

      - name: Deploy schema via PostgreSQL
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set +e  # Don't exit on first error

          echo "🔧 Connecting to Supabase database..."

          # Construct connection string
          PGHOST="db.${SUPABASE_PROJECT_ID}.supabase.co"
          PGPORT="5432"
          PGUSER="postgres"
          PGPASSWORD="${SUPABASE_DB_PASSWORD}"
          PGDATABASE="postgres"

          export PGHOST PGPORT PGUSER PGPASSWORD PGDATABASE

          # Test connection first
          echo "Testing connection..."
          if ! psql -c "SELECT version();" >/dev/null 2>&1; then
            echo "❌ Failed to connect to Supabase database"
            echo "   Check: SUPABASE_DB_PASSWORD is correct"
            exit 1
          fi

          echo "✅ Connected to Supabase"
          echo ""
          echo "📋 Deploying schema..."

          # Run schema deployment
          if psql -f supabase/schema.sql > /tmp/deploy.log 2>&1; then
            echo "✅ Schema deployed successfully"
            deployment_success=1
          else
            echo "❌ Schema deployment failed"
            cat /tmp/deploy.log | tail -20
            deployment_success=0
          fi

          # Run verification
          echo ""
          echo "🔍 Verifying deployment..."
          if [ $deployment_success -eq 1 ]; then
            if psql -f supabase/POST_DEPLOYMENT_VERIFICATION.sql > /tmp/verify.log 2>&1; then
              echo "✅ Deployment verification passed"
              cat /tmp/verify.log | grep "✓" || true
            else
              echo "⚠️  Verification script had errors"
              cat /tmp/verify.log | tail -20
            fi
          fi

          exit $deployment_success

      - name: Run security tests
        if: success()
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "🔐 Running security tests..."

          PGHOST="db.${SUPABASE_PROJECT_ID}.supabase.co"
          PGPORT="5432"
          PGUSER="postgres"
          PGPASSWORD="${SUPABASE_DB_PASSWORD}"
          PGDATABASE="postgres"

          export PGHOST PGPORT PGUSER PGPASSWORD PGDATABASE

          if psql -f supabase/SECURITY_TESTS.sql > /tmp/security.log 2>&1; then
            echo "✅ Security tests passed"
            cat /tmp/security.log | grep -E "✓|✅|PASS" || true
          else
            echo "⚠️  Some security tests failed (review for policy enforcement)"
            cat /tmp/security.log | tail -30
          fi

  post-deployment:
    name: Post-Deployment Status
    runs-on: ubuntu-latest
    if: always()
    needs: [preflight-check, deploy-schema]

    steps:
      - name: Report deployment status
        run: |
          if [ "${{ needs.deploy-schema.result }}" == "success" ]; then
            echo "✅ SUPABASE SCHEMA DEPLOYMENT SUCCESSFUL"
            echo ""
            echo "Next steps:"
            echo "1. Trigger Vercel redeployment (or push to main)"
            echo "2. Configure production environment variables in Vercel"
            echo "3. Verify application at https://newspulse-ai-production.vercel.app"
          else
            echo "❌ SUPABASE SCHEMA DEPLOYMENT FAILED"
            echo ""
            echo "Troubleshooting:"
            echo "1. Verify repository variable: SUPABASE_PROJECT_ID"
            echo "2. Verify GitHub secret: SUPABASE_DB_PASSWORD"
            echo "3. Verify credentials are correct and project exists"
            echo "4. Review workflow logs for detailed errors"
            exit 1
          fi
