name: Deploy Supabase Schema

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  # Uncomment to auto-deploy on push to main:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'supabase/schema.sql'
  #     - '.github/workflows/supabase-schema-deploy.yml'

jobs:
  preflight-check:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate schema file exists
        run: |
          if [ ! -f "supabase/schema.sql" ]; then
            echo "❌ supabase/schema.sql not found"
            exit 1
          fi
          echo "✅ Schema file found ($(wc -l < supabase/schema.sql) lines)"
          if [ ! -f "supabase/ceis-schema.sql" ]; then
            echo "❌ supabase/ceis-schema.sql not found"
            exit 1
          fi
          echo "✅ CEIS schema file found ($(wc -l < supabase/ceis-schema.sql) lines)"

      - name: Validate schema syntax (basic)
        run: |
          # Check for CREATE/DROP IF EXISTS (idempotency)
          create_count=$(grep -c "CREATE.*IF NOT EXISTS" supabase/schema.sql || true)
          drop_count=$(grep -c "DROP.*IF EXISTS" supabase/schema.sql || true)
          echo "✅ Found $create_count CREATE IF NOT EXISTS statements"
          echo "✅ Found $drop_count DROP IF EXISTS statements"

      - name: Verify verification scripts exist
        run: |
          if [ ! -f "supabase/POST_DEPLOYMENT_VERIFICATION.sql" ]; then
            echo "⚠️  POST_DEPLOYMENT_VERIFICATION.sql not found"
          fi
          if [ ! -f "supabase/SECURITY_TESTS.sql" ]; then
            echo "⚠️  SECURITY_TESTS.sql not found"
          fi
          echo "✅ Preflight checks passed"

  deploy-schema:
    name: Deploy Supabase Schema
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: preflight-check
    # Secrets/variables saved under a GitHub Environment (not repo-level)
    # are only visible to jobs that declare that environment.
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql --version

      - name: Extract and verify Supabase project ID
        env:
          # CI has no .env.local — resolve from repo variables/secrets first.
          VAR_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
          SECRET_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          VAR_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          SECRET_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          SUPABASE_PROJECT_ID="${VAR_PROJECT_ID:-$SECRET_PROJECT_ID}"
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            SUPABASE_URL="${VAR_SUPABASE_URL:-$SECRET_SUPABASE_URL}"
            # Local-run fallback only; .env.local is never present in CI checkouts.
            if [ -z "$SUPABASE_URL" ] && [ -f .env.local ]; then
              SUPABASE_URL=$(grep "NEXT_PUBLIC_SUPABASE_URL=" .env.local | cut -d'=' -f2 || echo "")
            fi
            if [ -n "$SUPABASE_URL" ]; then
              SUPABASE_PROJECT_ID=$(echo "$SUPABASE_URL" | sed 's/https:\/\/\([^.]*\).*/\1/')
            fi
          fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            # Default: the production project ref recorded in the repo's own
            # deployment evidence (docs/infra/DEPLOYMENT_EVIDENCE_TRACKING.md:
            # https://yrroytwfdrafvajdfkog.supabase.co). The ref is public by
            # design (it ships in every client bundle); a repo variable or
            # secret above always overrides this default.
            SUPABASE_PROJECT_ID="yrroytwfdrafvajdfkog"
            echo "ℹ️  Using project ref from deployment evidence docs (no variable/secret set)"
          fi
          echo "SUPABASE_PROJECT_ID=$SUPABASE_PROJECT_ID" >> $GITHUB_ENV
          echo "✅ Supabase project ID resolved: $SUPABASE_PROJECT_ID"

      - name: Verify database credentials
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL || vars.SUPABASE_DB_URL }}
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "✅ SUPABASE_DB_URL secret is configured (will be used for connection)"
          elif [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "✅ SUPABASE_DB_PASSWORD secret is configured"
            echo "ℹ️  Will try direct connection first, then auto-discover the IPv4 Session Pooler"
            echo "   if the direct host (db.${SUPABASE_PROJECT_ID}.supabase.co) is not reachable."
            echo "   Tip: set SUPABASE_DB_URL to the Session Pooler URI from Supabase Dashboard"
            echo "        → Settings → Database → Connection string (Session pooler, port 5432)"
            echo "   to skip auto-discovery and guarantee a stable connection."
          else
            echo "❌ No database credentials configured in GitHub secrets"
            echo ""
            echo "   Recommended: Set SUPABASE_DB_URL (full connection string)"
            echo "     Go to Settings → Secrets and variables → Actions → New repository secret"
            echo "     Name: SUPABASE_DB_URL"
            echo "     Value: From Supabase Dashboard → Settings → Database → Connection string"
            echo "            Use the 'Session pooler' URI (port 5432) for schema migrations"
            echo ""
            echo "   Alternative: Set SUPABASE_DB_PASSWORD (auto-discovery of Session Pooler"
            echo "     will be attempted when the direct db.{ref}.supabase.co host is unreachable)"
            echo "     Name: SUPABASE_DB_PASSWORD"
            echo "     Value: From Supabase Dashboard → Settings → Database → Database password"
            exit 1
          fi

      - name: Deploy schema via PostgreSQL
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL || vars.SUPABASE_DB_URL }}
        run: |
          set +e  # Don't exit on first error

          echo "🔧 Connecting to Supabase database..."

          # Prefer the full connection URL (required for newer Supabase projects
          # that use the Session Pooler instead of db.{ref}.supabase.co).
          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "ℹ️  Using SUPABASE_DB_URL for connection"
            PSQL_CONN_ARGS=("$SUPABASE_DB_URL")

            echo "Testing connection..."
            CONN_ERR=$( psql "${PSQL_CONN_ARGS[@]}" -c "SELECT version();" 2>&1 >/dev/null )
            if [ $? -ne 0 ]; then
              echo "❌ Failed to connect using SUPABASE_DB_URL"
              echo "   Error: $CONN_ERR"
              echo "   Verify the connection string at Supabase Dashboard → Settings → Database"
              exit 1
            fi
            echo "✅ Connected to Supabase (via SUPABASE_DB_URL)"
          else
            # Build connection from SUPABASE_DB_PASSWORD.
            # Newer Supabase projects are IPv6-only for the direct host
            # (db.{ref}.supabase.co), which is not reachable from IPv4-only
            # GitHub Actions runners without the Supabase IPv4 add-on.
            # We try the direct host first, then auto-discover the IPv4
            # Session Pooler by probing common Supabase AWS regions.
            export PGPORT="5432"
            export PGPASSWORD="${SUPABASE_DB_PASSWORD}"
            export PGDATABASE="postgres"
            export PGCONNECT_TIMEOUT=5
            PSQL_CONN_ARGS=()

            # Attempt 1: direct host (works if IPv4 add-on is enabled)
            echo "Testing direct connection (db.${SUPABASE_PROJECT_ID}.supabase.co)..."
            export PGHOST="db.${SUPABASE_PROJECT_ID}.supabase.co"
            export PGUSER="postgres"
            CONN_ERR=$( psql -c "SELECT version();" 2>&1 >/dev/null )
            if [ $? -eq 0 ]; then
              echo "✅ Direct connection established"
            else
              echo "ℹ️  Direct connection failed ($CONN_ERR)."
              echo "    Newer Supabase projects are IPv6-only; probing the IPv4 Session Pooler..."

              # Attempt 2: Session Pooler across all Supabase-hosted AWS regions.
              # The pooler is IPv4-reachable and does not require the IPv4 add-on.
              # Username format for the pooler is postgres.{project_ref}.
              POOLER_CONNECTED=0
              POOLER_USER="postgres.${SUPABASE_PROJECT_ID}"
              for REGION in us-east-1 eu-central-1 ap-southeast-1 us-west-1 eu-west-1 \
                            ap-northeast-1 sa-east-1 ca-central-1 ap-south-1 ap-southeast-2 \
                            us-west-2 ap-northeast-2; do
                POOLER_HOST="aws-0-${REGION}.pooler.supabase.com"
                PGHOST="$POOLER_HOST" PGUSER="$POOLER_USER" \
                  psql -c "SELECT version();" >/dev/null 2>&1
                if [ $? -eq 0 ]; then
                  echo "✅ Session Pooler connected (region: $REGION, host: $POOLER_HOST)"
                  export PGHOST="$POOLER_HOST"
                  export PGUSER="$POOLER_USER"
                  # Persist the working host/user so the security-tests step
                  # can reuse them without repeating the full probe loop.
                  echo "SUPABASE_PGHOST=$POOLER_HOST" >> "$GITHUB_ENV"
                  echo "SUPABASE_PGUSER=$POOLER_USER" >> "$GITHUB_ENV"
                  POOLER_CONNECTED=1
                  break
                fi
              done

              if [ $POOLER_CONNECTED -eq 0 ]; then
                echo "❌ All connection attempts failed"
                echo ""
                echo "   To fix: set SUPABASE_DB_URL in GitHub Secrets or Variables"
                echo "     Supabase Dashboard → Settings → Database → Connection string"
                echo "     Copy the 'Session pooler' URI (port 5432, user postgres.{ref})"
                echo "     and add it as secret SUPABASE_DB_URL."
                exit 1
              fi
            fi
            echo "✅ Connected to Supabase"
          fi
          echo ""
          echo "📋 Deploying schema..."

          # Use 0/1 bash exit-code convention: 0 = still good, 1 = failure occurred
          deployment_failed=0

          # Run schema deployment
          if psql "${PSQL_CONN_ARGS[@]}" -f supabase/schema.sql > /tmp/deploy.log 2>&1; then
            echo "✅ Schema deployed successfully"
          else
            echo "❌ Schema deployment failed"
            cat /tmp/deploy.log | tail -20
            deployment_failed=1
          fi

          # Deploy the CEIS schema (DNA-300) — idempotent, five ceis_* tables
          if [ $deployment_failed -eq 0 ]; then
            echo ""
            echo "🧬 Deploying CEIS schema..."
            if psql "${PSQL_CONN_ARGS[@]}" -f supabase/ceis-schema.sql > /tmp/ceis-deploy.log 2>&1; then
              echo "✅ CEIS schema deployed successfully"
            else
              echo "❌ CEIS schema deployment failed"
              cat /tmp/ceis-deploy.log | tail -20
              deployment_failed=1
            fi
          fi

          # Run verification
          echo ""
          echo "🔍 Verifying deployment..."
          if [ $deployment_failed -eq 0 ]; then
            if psql "${PSQL_CONN_ARGS[@]}" -f supabase/POST_DEPLOYMENT_VERIFICATION.sql > /tmp/verify.log 2>&1; then
              echo "✅ Deployment verification passed"
              cat /tmp/verify.log | grep "✓" || true
            else
              echo "⚠️  Verification script had errors"
              cat /tmp/verify.log | tail -20
            fi
            # CEIS (DNA-300) verification — hard-fails on missing tables or RLS
            if psql "${PSQL_CONN_ARGS[@]}" -v ON_ERROR_STOP=1 -f supabase/CEIS_POST_DEPLOYMENT_VERIFICATION.sql > /tmp/ceis-verify.log 2>&1; then
              echo "✅ CEIS verification passed (5 tables, RLS enabled)"
            else
              echo "❌ CEIS verification failed"
              cat /tmp/ceis-verify.log | tail -20
              deployment_failed=1
            fi
          fi

          exit $deployment_failed

      - name: Run security tests
        if: success()
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL || vars.SUPABASE_DB_URL }}
          # Pooler host/user discovered and saved by the deploy step (if auto-discovery ran)
          SUPABASE_PGHOST: ${{ env.SUPABASE_PGHOST }}
          SUPABASE_PGUSER: ${{ env.SUPABASE_PGUSER }}
        run: |
          echo "🔐 Running security tests..."

          if [ -n "$SUPABASE_DB_URL" ]; then
            PSQL_CONN_ARGS=("$SUPABASE_DB_URL")
          elif [ -n "$SUPABASE_PGHOST" ]; then
            # Reuse the connection params discovered by the deploy step
            export PGHOST="$SUPABASE_PGHOST"
            export PGUSER="$SUPABASE_PGUSER"
            export PGPORT="5432"
            export PGPASSWORD="${SUPABASE_DB_PASSWORD}"
            export PGDATABASE="postgres"
            PSQL_CONN_ARGS=()
          else
            PGHOST="db.${SUPABASE_PROJECT_ID}.supabase.co"
            PGPORT="5432"
            PGUSER="postgres"
            PGPASSWORD="${SUPABASE_DB_PASSWORD}"
            PGDATABASE="postgres"
            export PGHOST PGPORT PGUSER PGPASSWORD PGDATABASE
            PSQL_CONN_ARGS=()
          fi

          if psql "${PSQL_CONN_ARGS[@]}" -f supabase/SECURITY_TESTS.sql > /tmp/security.log 2>&1; then
            echo "✅ Security tests passed"
            cat /tmp/security.log | grep -E "✓|✅|PASS" || true
          else
            echo "⚠️  Some security tests failed (review for policy enforcement)"
            cat /tmp/security.log | tail -30
          fi

  post-deployment:
    name: Post-Deployment Status
    runs-on: ubuntu-latest
    if: always()
    needs: [preflight-check, deploy-schema]

    steps:
      - name: Report deployment status
        run: |
          if [ "${{ needs.deploy-schema.result }}" == "success" ]; then
            echo "✅ SUPABASE SCHEMA DEPLOYMENT SUCCESSFUL"
            echo ""
            echo "Next steps:"
            echo "1. Trigger Vercel redeployment (or push to main)"
            echo "2. Configure production environment variables in Vercel"
            echo "3. Verify application at https://newspulse-ai-production.vercel.app"
          else
            echo "❌ SUPABASE SCHEMA DEPLOYMENT FAILED"
            echo ""
            echo "Troubleshooting:"
            echo "1. If connection failed: set SUPABASE_DB_URL secret to the full Session Pooler"
            echo "   connection string from Supabase Dashboard → Settings → Database"
            echo "   (Session pooler URI, port 5432, username postgres.{ref})"
            echo "   This is the most reliable option and works for all Supabase projects."
            echo "2. If using SUPABASE_DB_PASSWORD without SUPABASE_DB_URL: the workflow"
            echo "   auto-tries the Session Pooler across all Supabase regions. If all fail,"
            echo "   verify the password is correct and set SUPABASE_DB_URL instead."
            echo "3. Review workflow logs for the exact error from psql."
            exit 1
          fi
