name: Verify Production Configuration

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  verify-config:
    name: Check Production Readiness
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Verify GitHub Actions Secrets (CI/CD only)
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          echo "🔐 Checking GitHub Actions secrets (required for CI/CD)..."
          echo ""

          declare -A secrets=(
            [SUPABASE_SERVICE_ROLE_KEY]="Supabase Service Role Key"
            [ADMIN_TOKEN]="Admin Authentication Token"
          )

          # Note: SUPABASE_DB_PASSWORD only required for schema deployment workflow
          missing=0
          for secret in "${!secrets[@]}"; do
            value="${!secret}"
            if [ -z "$value" ]; then
              echo "❌ ${secrets[$secret]}: NOT CONFIGURED"
              ((missing++))
            else
              echo "✅ ${secrets[$secret]}: Configured"
            fi
          done

          if [ $missing -gt 0 ]; then
            echo ""
            echo "⚠️  Missing $missing GitHub Actions secrets"
            echo ""
            echo "Configure in GitHub: Settings → Secrets and variables → Actions"
            echo "Required secrets:"
            echo "  - SUPABASE_SERVICE_ROLE_KEY (from Supabase Dashboard → Settings → API)"
            echo "  - ADMIN_TOKEN (generate: openssl rand -hex 32)"
            echo ""
            echo "For schema deployment also add:"
            echo "  - SUPABASE_DB_PASSWORD (from Supabase Dashboard → Settings → Database)"
            exit 1
          fi

          echo ""
          echo "✅ All required GitHub Actions secrets configured"

      - name: Verify Vercel Environment Configuration
        run: |
          echo "🌐 Vercel environment configuration (separate system)"
          echo ""
          echo "⚠️  GitHub Actions and Vercel use separate configuration stores"
          echo ""
          echo "Required Vercel environment variables:"
          echo "  - NEXT_PUBLIC_SUPABASE_URL"
          echo "  - NEXT_PUBLIC_SUPABASE_ANON_KEY"
          echo "  - SUPABASE_SERVICE_ROLE_KEY"
          echo "  - NEXT_PUBLIC_APP_URL"
          echo "  - ADMIN_TOKEN"
          echo "  - GITHUB_OWNER (optional)"
          echo "  - GITHUB_REPO (optional)"
          echo "  - GITHUB_TOKEN (for API endpoints)"
          echo "  - VERCEL_TOKEN (optional, for cost monitoring)"
          echo ""
          echo "Configure at: Vercel Dashboard → Settings → Environment Variables"
          echo "Note: These are independent from GitHub Actions configuration"

      - name: Summary
        run: |
          echo ""
          echo "=== GITHUB ACTIONS CONFIGURATION STATUS ==="
          echo "✅ GitHub Actions secrets verified"
          echo ""
          echo "Next steps:"
          echo "1. Configure Vercel environment variables (separate system)"
          echo "2. Deploy Supabase schema (if not already deployed)"
          echo "3. Monitor Vercel deployment"
          echo "4. Verify production application at your Vercel URL"
